name: Weekly Retrain

on:
  schedule:
    - cron: "0 2 * * 1"   # 毎週月曜 UTC 02:00 (JST 11:00)
  workflow_dispatch:
    inputs:
      memo:
        description: 'この実行の意図'
        required: false
        type: string

jobs:
  retrain:
    runs-on: [self-hosted, Linux, ARM64]
    timeout-minutes: 360
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup venv and install dependencies
        run: |
          python3 -m venv .venv
          . .venv/bin/activate
          pip install -r requirements.txt
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"

      - name: Fetch Statcast data (incl. bat tracking + arsenal)
        run: python src/fetch_statcast.py
        env:
          PYBASEBALL_CACHE: "1"

      - name: Setup GCP credentials (for pre-validation)
        run: echo '${{ secrets.GCP_SA_KEY }}' > /tmp/gcp-sa-key.json
        continue-on-error: true

      - name: Validate BQ compatibility (fail-fast before training)
        run: python src/load_to_bq.py --validate
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcp-sa-key.json
        continue-on-error: true

      - name: Train LightGBM (Optuna 1000 trials + recency weight)
        run: python src/train.py
        env:
          WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
          WANDB_ENTITY: ${{ secrets.WANDB_ENTITY }}

      - name: Train CatBoost (Optuna 200 trials + pruning + recency weight)
        run: python src/train_catboost.py
        env:
          WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
          WANDB_ENTITY: ${{ secrets.WANDB_ENTITY }}

      - name: Train Component models (PECOTA approach)
        run: python src/train_components.py
        env:
          WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
          WANDB_ENTITY: ${{ secrets.WANDB_ENTITY }}

      - name: Train Bayes model (ElasticNet + LGB/Cat stacking)
        run: python src/train_bayes.py
        env:
          WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
          WANDB_ENTITY: ${{ secrets.WANDB_ENTITY }}

      - name: Ensemble (5-model inverse-MAE weighted)
        id: ensemble
        run: |
          python src/ensemble.py 2>&1 | tee /tmp/ensemble_output.txt
          # Extract MAE values for Discord notification
          python3 -c "
          import json
          from pathlib import Path
          m = json.loads(Path('predictions/model_metrics.json').read_text())
          lines = []
          for k in ['lgb_mae_woba', 'cat_mae_woba', 'bayes_mae_woba', 'component_mae_woba', 'marcel_mae_woba']:
              if k in m:
                  label = k.replace('_mae_woba', '').replace('lgb', 'LGB').replace('cat', 'Cat').replace('bayes', 'Bayes').replace('component', 'Comp').replace('marcel', 'Marcel')
                  lines.append(f'{label}: {m[k]:.4f}')
          print('BAT_MAE=' + ' | '.join(lines))
          lines2 = []
          for k in ['lgb_mae_xfip', 'cat_mae_xfip', 'bayes_mae_xfip', 'component_mae_xfip', 'marcel_mae_xfip']:
              if k in m:
                  label = k.replace('_mae_xfip', '').replace('lgb', 'LGB').replace('cat', 'Cat').replace('bayes', 'Bayes').replace('component', 'Comp').replace('marcel', 'Marcel')
                  lines2.append(f'{label}: {m[k]:.4f}')
          print('PIT_MAE=' + ' | '.join(lines2))
          " >> "$GITHUB_OUTPUT"
        env:
          WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
          WANDB_ENTITY: ${{ secrets.WANDB_ENTITY }}

      # === GCP BigQuery + BQML ===
      - name: Load all data to BigQuery
        run: python src/load_to_bq.py --all --metrics
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcp-sa-key.json
        continue-on-error: true

      - name: Train & evaluate BQML models
        id: bqml
        run: |
          python src/bqml_train.py --all 2>&1 | tee /tmp/bqml_output.txt
          # Extract BQML MAE for Discord
          python3 -c "
          import json
          from pathlib import Path
          m = json.loads(Path('predictions/model_metrics.json').read_text())
          parts = []
          for k in ['bqml_bt_mae_woba', 'bqml_linear_mae_woba']:
              if k in m:
                  label = k.replace('bqml_bt_mae_woba', 'BT').replace('bqml_linear_mae_woba', 'Linear')
                  parts.append(f'{label}: {m[k]:.4f}')
          print('BQML_BAT=' + (' | '.join(parts) if parts else 'N/A'))
          parts2 = []
          for k in ['bqml_bt_mae_xfip', 'bqml_linear_mae_xfip']:
              if k in m:
                  label = k.replace('bqml_bt_mae_xfip', 'BT').replace('bqml_linear_mae_xfip', 'Linear')
                  parts2.append(f'{label}: {m[k]:.4f}')
          print('BQML_PIT=' + (' | '.join(parts2) if parts2 else 'N/A'))
          " >> "$GITHUB_OUTPUT"
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcp-sa-key.json
        continue-on-error: true

      - name: Cleanup GCP credentials
        if: always()
        run: rm -f /tmp/gcp-sa-key.json

      - name: Trigger API reload (RPi5)
        run: |
          if [ -n "$API_RELOAD_URL" ]; then
            curl -s -X POST "${API_RELOAD_URL}/model/reload" || echo "Reload skipped (API not reachable)"
          else
            echo "API_RELOAD_URL not set, skipping reload"
          fi
        env:
          API_RELOAD_URL: ${{ secrets.API_RELOAD_URL }}
        continue-on-error: true

      - name: Commit predictions to repo (for Streamlit Cloud)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add predictions/
          git diff --staged --quiet || git commit -m "chore: update predictions (v8 5-model ensemble) [skip ci]"
          git pull --rebase origin ${{ github.ref_name }}
          git push

      - name: Upload predictions as artifact
        uses: actions/upload-artifact@v4
        with:
          name: predictions-${{ github.run_number }}
          path: predictions/
          if-no-files-found: ignore
          retention-days: 30

      - name: Notify Discord (success)
        if: success()
        run: |
          BAT_MAE="${{ steps.ensemble.outputs.BAT_MAE }}"
          PIT_MAE="${{ steps.ensemble.outputs.PIT_MAE }}"
          BQML_BAT="${{ steps.bqml.outputs.BQML_BAT }}"
          BQML_PIT="${{ steps.bqml.outputs.BQML_PIT }}"
          MEMO="${{ inputs.memo }}"
          curl -s -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"✅ baseball-mlops v9 再学習完了 (GCP統合)\",
                \"color\": 3066993,
                \"fields\": [
                  {\"name\": \"打者 wOBA MAE (Python)\", \"value\": \"${BAT_MAE:-計測中}\", \"inline\": false},
                  {\"name\": \"投手 xFIP MAE (Python)\", \"value\": \"${PIT_MAE:-計測中}\", \"inline\": false},
                  {\"name\": \"打者 wOBA MAE (BQML)\", \"value\": \"${BQML_BAT:-N/A}\", \"inline\": false},
                  {\"name\": \"投手 xFIP MAE (BQML)\", \"value\": \"${BQML_PIT:-N/A}\", \"inline\": false},
                  {\"name\": \"モデル構成\", \"value\": \"Python 5-model + BQML Boosted Tree + Linear\", \"inline\": false},
                  {\"name\": \"BigQuery\", \"value\": \"13 raw + 2 pred tables\", \"inline\": true},
                  {\"name\": \"ブランチ\", \"value\": \"${{ github.ref_name }}\", \"inline\": true},
                  {\"name\": \"トリガー\", \"value\": \"${{ github.event_name }}\", \"inline\": true},
                  {\"name\": \"メモ\", \"value\": \"${MEMO:-cron}\", \"inline\": true},
                  {\"name\": \"実行ログ\", \"value\": \"[GitHub Actions](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})\", \"inline\": false}
                ],
                \"footer\": {\"text\": \"v9: GCP BigQuery + BQML + Cloud Run\"}
              }]
            }"
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        continue-on-error: true

      - name: Notify Discord (failure)
        if: failure()
        run: |
          MEMO="${{ inputs.memo }}"
          curl -s -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"❌ baseball-mlops v9 再学習失敗\",
                \"color\": 15158332,
                \"fields\": [
                  {\"name\": \"ブランチ\", \"value\": \"${{ github.ref_name }}\", \"inline\": true},
                  {\"name\": \"メモ\", \"value\": \"${MEMO:-cron}\", \"inline\": true},
                  {\"name\": \"実行ログ\", \"value\": \"[GitHub Actions](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})\", \"inline\": false}
                ]
              }]
            }"
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        continue-on-error: true

  # -------------------------------------------------------
  # Cloud Run デプロイ（master のみ、retrain 完了後）
  # ubuntu-latest で gcloud CLI を使用
  # -------------------------------------------------------
  deploy-cloudrun:
    needs: retrain
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build and push Docker image
        run: |
          IMAGE="us-central1-docker.pkg.dev/data-platform-490901/apis/baseball-mlops-api:$(date +%Y%m%d)-${{ github.run_number }}"
          echo "IMAGE=${IMAGE}" >> "$GITHUB_ENV"
          docker build -t "${IMAGE}" .
          docker push "${IMAGE}"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy baseball-mlops-api \
            --image "${IMAGE}" \
            --region us-central1 \
            --platform managed \
            --no-allow-unauthenticated \
            --memory 512Mi \
            --max-instances 1 \
            --min-instances 0 \
            --port 8080 \
            --set-env-vars "WANDB_API_KEY=${{ secrets.WANDB_API_KEY }},WANDB_ENTITY=${{ secrets.WANDB_ENTITY }}"

      - name: Health check
        run: |
          URL=$(gcloud run services describe baseball-mlops-api --region us-central1 --format 'value(status.url)')
          echo "Cloud Run URL: ${URL}"
          curl -sf "${URL}/model/info" || echo "Cold start — health check will pass on next ping"
        continue-on-error: true
