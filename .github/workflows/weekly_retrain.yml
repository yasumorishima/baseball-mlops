name: Weekly Retrain

on:
  schedule:
    - cron: "0 2 * * 1"   # 毎週月曜 UTC 02:00 (JST 11:00)
  workflow_dispatch:        # 手動実行も可

jobs:
  retrain:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: write   # predictions/ の自動コミット & プッシュに必要

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch Statcast data
        run: python src/fetch_statcast.py
        env:
          PYBASEBALL_CACHE: "1"

      - name: Train models & log to W&B
        run: python src/train.py
        env:
          WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
          WANDB_ENTITY: ${{ secrets.WANDB_ENTITY }}

      - name: Train Bayes model
        run: python src/train_bayes.py
        env:
          WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
          WANDB_ENTITY: ${{ secrets.WANDB_ENTITY }}

      - name: Trigger API reload (optional)
        run: |
          if [ -n "$API_RELOAD_URL" ]; then
            curl -s -X POST "${API_RELOAD_URL}/model/reload" || echo "Reload skipped (API not reachable)"
          else
            echo "API_RELOAD_URL not set, skipping reload"
          fi
        env:
          API_RELOAD_URL: ${{ secrets.API_RELOAD_URL }}
        continue-on-error: true

      - name: Commit predictions to repo (for Streamlit Cloud)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add predictions/
          git diff --staged --quiet || git commit -m "chore: update predictions [skip ci]"
          git pull --rebase origin ${{ github.ref_name }}
          git push

      - name: Upload predictions as artifact
        uses: actions/upload-artifact@v4
        with:
          name: predictions-${{ github.run_number }}
          path: predictions/
          if-no-files-found: ignore
          retention-days: 30

      - name: Notify Discord (success)
        if: success()
        run: |
          curl -s -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"✅ baseball-mlops 再学習完了\",
                \"color\": 3066993,
                \"fields\": [
                  {\"name\": \"ブランチ\", \"value\": \"${{ github.ref_name }}\", \"inline\": true},
                  {\"name\": \"トリガー\", \"value\": \"${{ github.event_name }}\", \"inline\": true},
                  {\"name\": \"実行ログ\", \"value\": \"[GitHub Actions](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})\", \"inline\": false}
                ],
                \"footer\": {\"text\": \"Optuna 1000 trials + Bayes CI\"}
              }]
            }"
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        continue-on-error: true

      - name: Notify Discord (failure)
        if: failure()
        run: |
          curl -s -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"❌ baseball-mlops 再学習失敗\",
                \"color\": 15158332,
                \"fields\": [
                  {\"name\": \"ブランチ\", \"value\": \"${{ github.ref_name }}\", \"inline\": true},
                  {\"name\": \"実行ログ\", \"value\": \"[GitHub Actions](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})\", \"inline\": false}
                ]
              }]
            }"
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        continue-on-error: true
