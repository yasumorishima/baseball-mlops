name: Backtest Analysis

on:
  workflow_dispatch:

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch Statcast data
        run: python src/fetch_statcast.py
        env:
          PYBASEBALL_CACHE: "1"

      - name: Run backtest analysis
        run: cd src && python backtest.py
        env:
          WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
          WANDB_ENTITY: ${{ secrets.WANDB_ENTITY }}

      - name: Commit backtest results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add predictions/backtest/
          git diff --staged --quiet || git commit -m "chore: add backtest results [skip ci]"
          git pull --rebase origin ${{ github.ref_name }}
          git push

      - name: Upload backtest artifact
        uses: actions/upload-artifact@v4
        with:
          name: backtest-results-${{ github.run_number }}
          path: predictions/backtest/
          retention-days: 90

      - name: Notify Discord
        if: always()
        run: |
          STATUS="${{ job.status }}"
          if [ "$STATUS" = "success" ]; then
            TITLE="Backtest Analysis Complete"
            COLOR=3066993
          else
            TITLE="Backtest Analysis Failed"
            COLOR=15158332
          fi
          curl -sS -w "\nHTTP %{http_code}\n" -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"$TITLE\",
                \"color\": $COLOR,
                \"fields\": [
                  {\"name\": \"Status\", \"value\": \"$STATUS\", \"inline\": true},
                  {\"name\": \"Log\", \"value\": \"[Actions](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})\", \"inline\": true}
                ],
                \"footer\": {\"text\": \"Year-by-year stability + outlier analysis\"}
              }]
            }"
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        continue-on-error: true
